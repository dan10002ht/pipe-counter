name: pipe_counter
description: Count pipes (round & square) from camera using on-device AI

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  image_picker: ^1.0.7
  image: ^4.1.4
  path_provider: ^2.1.2
  path: ^1.9.0
  permission_handler: ^11.3.0
  onnxruntime: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
